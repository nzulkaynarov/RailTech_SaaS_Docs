# Markdown lint configuration
default: true

# Allow long lines in markdown (documentation content)
MD013: false

# Allow inline HTML (Hugo shortcodes and HTML comments)
MD033: false

# Allow duplicate headings in different sections
MD024:
  siblings_only: true

# Allow trailing punctuation in headings (Russian style)
MD026:
  punctuation: ".,;:!"

# Fenced code blocks should have a language
MD040: true
